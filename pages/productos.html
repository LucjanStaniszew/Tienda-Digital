    <main class="prod">
        <h1 class="text-center">Productos de Tienda Digital</h1>
        <section>
            <h2 class="text-center">Quantum Pro</h2>
            <img src="../assets/quantum-pro.png" alt="Quantum Pro" class="prod-img">
            <div class="container">
                <div class="row">
                    <div class="col-sm-3 col-md-2 col-lg-4"></div>
                    <div class="col-sm-6 col-md-8 col-lg-4">
                        <div id="carouselMobile" class="carousel slide carousel-fade" data-bs-ride="carousel">
                            <div class="carousel-indicators">
                                <button type="button" data-bs-target="#carouselMobile" data-bs-slide-to="0"
                                    class="active" aria-current="true" aria-label="Slide 1"></button>
                                <button type="button" data-bs-target="#carouselMobile" data-bs-slide-to="1"
                                    aria-label="Slide 2"></button>
                            </div>
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../assets/quantum-pro-frente.png" class="d-block w-100" alt="Quantum Pro">
                                </div>
                                <div class="carousel-item">
                                    <img src="../assets/quantum-pro-trasero.png" class="d-block w-100"
                                        alt="Quantum Pro">
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#carouselMobile"
                                data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#carouselMobile"
                                data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                        <div class="col-sm-3 col-md-2 col-lg-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-center">Nebula Tab</h2>
            <img src="../assets/nebula-tab-x.png" alt="Nebula Tab" class="prod-img">
            <div class="container">
                <div class="row">
                    <div class="col-sm-3 col-md-2 col-lg-4"></div>
                    <div class="col-sm-6 col-md-8 col-lg-4">
                        <div id="carouselTablet" class="carousel slide carousel-fade" data-bs-ride="carousel">
                            <div class="carousel-indicators">
                                <button type="button" data-bs-target="#carouselTablet" data-bs-slide-to="0"
                                    class="active" aria-current="true" aria-label="Slide 1"></button>
                                <button type="button" data-bs-target="#carouselTablet" data-bs-slide-to="1"
                                    aria-label="Slide 2"></button>

                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../assets/nebula-tab-x-front.png" class="d-block w-100" alt="Nebula Tab">
                                </div>
                                <div class="carousel-item">
                                    <img src="../assets/nebula-tab-x-trasero.png" class="d-block w-100"
                                        alt="Nebula Tab">
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#carouselTablet"
                                data-bs-slide="prev">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button class="carousel-control-next" type="button" data-bs-target="#carouselTablet"
                                data-bs-slide="next">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                        <div class="col-sm-3 col-md-2 col-lg-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <h2 class="text-center">Novabook X</h2>
            <img src="../assets/novabook-x.png" alt="Novabook-X" class="prod-img">
        <div class="container">
            <div class="row">
                <div class="col-sm-3 col-md-2 col-lg-4"></div>
                <div class="col-sm-6 col-md-8 col-lg-4">
                    <div id="carouselNotebook" class="carousel slide carousel-fade" data-bs-ride="carousel">
                        <div class="carousel-indicators">
                            <button type="button" data-bs-target="#carouselNotebook" data-bs-slide-to="0" class="active"
                                aria-current="true" aria-label="Slide 1"></button>
                            <button type="button" data-bs-target="#carouselNotebook" data-bs-slide-to="1"
                                aria-label="Slide 2"></button>
                        </div>
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                                <img src="../assets/novabook-x.png" class="d-block w-100" alt="Novabook-X">
                            </div>
                            <div class="carousel-item">
                                <img src="../assets/novabook-x-frente.png" class="d-block w-100" alt="Novabook-X">
                            </div>
                        </div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselNotebook"
                            data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Previous</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselNotebook"
                            data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Next</span>
                        </button>
                    </div>
